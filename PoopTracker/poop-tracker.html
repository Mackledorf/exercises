<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poop Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div class="app">

    <!-- ======== SIDEBAR NAV ======== -->
    <nav class="sidebar">
      <!-- Profile -->
      <button class="nav-btn active" data-page="0">
        <i data-lucide="user"></i>
      </button>
      <!-- Food -->
      <button class="nav-btn" data-page="1">
        <i data-lucide="pizza"></i>
      </button>
      <!-- Digestion (toilet) -->
      <button class="nav-btn" data-page="2">
        <i data-lucide="toilet"></i>
      </button>
      <!-- Progress -->
      <button class="nav-btn" data-page="3">
        <i data-lucide="chart-no-axes-combined"></i>
      </button>
    </nav>

    <!-- ======== PAGES CONTAINER ======== -->
    <main class="pages" id="pages">

      <!-- ======== PAGE 0: PROFILE / WELCOME ======== -->
      <section class="page page-profile" id="page-profile">
        <div class="profile-left">
          <div class="profile-header">
            <div class="welcome-icon">
              <i data-lucide="user"></i>
            </div>
            <h1 class="welcome-text">WELCOME</h1>
          </div>
          <nav class="profile-menu">
            <button class="menu-item" data-goto="1">
              <div class="menu-icon">
                <i data-lucide="pizza"></i>
              </div>
              <span class="menu-label">&gt;TRACK FOOD</span>
            </button>
            <button class="menu-item" data-goto="2">
              <div class="menu-icon">
                <i data-lucide="toilet"></i>
              </div>
              <span class="menu-label">&gt;POOP</span>
            </button>
            <button class="menu-item" data-goto="3">
              <div class="menu-icon">
                <i data-lucide="chart-no-axes-combined"></i>
              </div>
              <span class="menu-label">&gt;VIEW PROGRESS</span>
            </button>
          </nav>
        </div>
      </section>

      <!-- ======== PAGE 1: FOOD LOG ======== -->
      <section class="page" id="page-food">
        <div class="page-left">
          <!-- List View -->
          <div class="content-card" id="food-list-view">
            <div class="card-header"><h2>FOOD LOG</h2></div>
            <div class="card-body">
              <div class="search-bar">
                <input type="text" placeholder="">
                <i data-lucide="search"></i>
              </div>
              <div id="food-list"></div>
            </div>
          </div>
          <!-- Detail View -->
          <div class="content-card hidden" id="food-detail-view">
            <div class="card-header"><h2>FOOD LOG</h2></div>
            <div class="card-body">
              <div class="detail-nav">
                <button class="btn-nav" id="btn-back">
                  <i data-lucide="chevron-left"></i>
                </button>
                <button class="btn-nav" id="btn-home">
                  <i data-lucide="house"></i>
                </button>
              </div>
              <div id="detail-content"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- ======== PAGE 2: DIGESTION ======== -->
      <section class="page" id="page-digestion">
        <div class="page-left">
          <div class="content-card">
            <div class="card-header"><h2>DIGESTION</h2></div>
            <div class="card-body">
              <div class="search-bar">
                <input type="text" placeholder="">
                <i data-lucide="search"></i>
              </div>
              <div id="digestion-list"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- ======== PAGE 3: PROGRESS ======== -->
      <section class="page" id="page-progress">
        <div class="page-left">
          <div class="content-card">
            <div class="card-header"><h2>MY PROGRESS</h2></div>
            <div class="card-body">
              <div class="search-bar">
                <input type="text" placeholder="">
                <i data-lucide="search"></i>
              </div>
              <div id="progress-food-list"></div>
            </div>
          </div>
        </div>
        <div class="page-right page-right-progress">
          <div class="progress-right-top">
            <div class="progress-charts">
              <div class="progress-toggle">
                <button class="toggle-btn active" data-view="day">DAY</button>
                <button class="toggle-btn" data-view="week">WEEK</button>
              </div>
              <div class="progress-view" id="day-view"></div>
              <div class="progress-view hidden" id="week-view"></div>
            </div>
            <!-- Stacked Cylinder Chart -->
            <div class="cylinder-container">
              <svg class="cylinder-svg" viewBox="0 0 120 240">
                <defs>
                  <pattern id="diag" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
                    <line x1="0" y1="0" x2="0" y2="6" stroke="rgba(0,0,0,0.12)" stroke-width="2.5"/>
                  </pattern>
                  <linearGradient id="cylShade" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
                    <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
                    <stop offset="100%" stop-color="rgba(0,0,0,0.18)"/>
                  </linearGradient>
                </defs>
                <!-- FAT (green, bottom) -->
                <ellipse cx="60" cy="210" rx="48" ry="14" fill="#388e3c" stroke="#2d2d2d" stroke-width="2"/>
                <rect x="12" y="170" width="96" height="40" fill="#4caf50"/>
                <rect x="12" y="170" width="96" height="40" fill="url(#diag)"/>
                <rect x="12" y="170" width="96" height="40" fill="url(#cylShade)"/>
                <rect x="12" y="170" width="96" height="40" fill="none" stroke="#2d2d2d" stroke-width="2"/>
                <ellipse cx="60" cy="170" rx="48" ry="14" fill="#66bb6a" stroke="#2d2d2d" stroke-width="2"/>
                <!-- PROTEIN (purple) -->
                <rect x="12" y="120" width="96" height="50" fill="#9b59b6"/>
                <rect x="12" y="120" width="96" height="50" fill="url(#diag)"/>
                <rect x="12" y="120" width="96" height="50" fill="url(#cylShade)"/>
                <rect x="12" y="120" width="96" height="50" fill="none" stroke="#2d2d2d" stroke-width="2"/>
                <ellipse cx="60" cy="120" rx="48" ry="14" fill="#b07cc5" stroke="#2d2d2d" stroke-width="2"/>
                <!-- CARBS (coral) -->
                <rect x="12" y="65" width="96" height="55" fill="#ef6c53"/>
                <rect x="12" y="65" width="96" height="55" fill="url(#diag)"/>
                <rect x="12" y="65" width="96" height="55" fill="url(#cylShade)"/>
                <rect x="12" y="65" width="96" height="55" fill="none" stroke="#2d2d2d" stroke-width="2"/>
                <ellipse cx="60" cy="65" rx="48" ry="14" fill="#f28a75" stroke="#2d2d2d" stroke-width="2"/>
                <!-- CALORIES (cyan, top) -->
                <rect x="12" y="25" width="96" height="40" fill="#00bcd4"/>
                <rect x="12" y="25" width="96" height="40" fill="url(#diag)"/>
                <rect x="12" y="25" width="96" height="40" fill="url(#cylShade)"/>
                <rect x="12" y="25" width="96" height="40" fill="none" stroke="#2d2d2d" stroke-width="2"/>
                <ellipse cx="60" cy="25" rx="48" ry="14" fill="#26c6da" stroke="#2d2d2d" stroke-width="2"/>
              </svg>
            </div>
          </div>
        </div>
      </section>

    </main>

    <!-- ======== BODY COLUMN — spans pages 0-2 ======== -->
    <div class="body-column" id="body-column">
      <!-- Page 0: Head + Shoulders -->
      <div class="body-section body-section-profile">
        <svg class="body-head" viewBox="0 0 400 500">
          <defs>
            <linearGradient id="silGrad" x1="0.3" y1="0" x2="0.7" y2="1">
              <stop offset="0%" stop-color="#f5dfa0"/>
              <stop offset="100%" stop-color="#dab040"/>
            </linearGradient>
          </defs>
          <circle cx="200" cy="120" r="100" fill="url(#silGrad)"/>
          <path d="M60 500 L60 340 Q60 260 140 260 L260 260 Q340 260 340 340 L340 500" fill="url(#silGrad)"/>
        </svg>
      </div>
      <!-- Divider -->
      <div class="body-divider"></div>
      <!-- Page 1: Torso with Stomach -->
      <div class="body-section body-section-organ">
        <div class="body-torso">
          <div class="organ-window">
            <svg class="organ-svg" viewBox="0 0 220 280">
              <defs>
                <linearGradient id="stomachGrad" x1="0.2" y1="0" x2="0.8" y2="1">
                  <stop offset="0%" stop-color="#c9506a"/>
                  <stop offset="100%" stop-color="#7a1e38"/>
                </linearGradient>
                <radialGradient id="stomachHighlight" cx="0.35" cy="0.38" r="0.5">
                  <stop offset="0%" stop-color="rgba(210,100,120,0.4)"/>
                  <stop offset="100%" stop-color="rgba(210,100,120,0)"/>
                </radialGradient>
              </defs>
              <!-- Background cavity -->
              <rect x="10" y="10" width="200" height="260" rx="40" fill="#3d1020"/>
              <rect x="10" y="10" width="200" height="260" rx="40" fill="url(#stomachHighlight)"/>
              <!-- Border -->
              <rect x="10" y="10" width="200" height="260" rx="40" fill="none" stroke="#9e3a52" stroke-width="6"/>
              <!-- Esophagus -->
              <path d="M95 18 C92 35 88 55 82 75" fill="none" stroke="#b55570" stroke-width="12" stroke-linecap="round"/>
              <path d="M125 18 C128 35 132 55 138 70" fill="none" stroke="#b55570" stroke-width="12" stroke-linecap="round"/>
              <!-- Stomach body -->
              <path d="M82 75 C65 85 40 110 35 145 C30 185 45 220 75 235 C100 245 125 240 140 225 C155 210 165 185 160 155 C155 125 145 95 138 70"
                    fill="#9e3a52" stroke="#b55570" stroke-width="5"/>
              <!-- Inner highlight curve -->
              <path d="M82 90 C72 110 55 145 50 180 C47 205 60 228 80 238"
                    fill="none" stroke="#c06880" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
              <!-- Small inner fold -->
              <path d="M90 120 C85 135 80 155 82 170"
                    fill="none" stroke="#c06880" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
            </svg>
          </div>
        </div>
      </div>
      <!-- Divider -->
      <div class="body-divider"></div>
      <!-- Page 2: Lower Torso with Intestines -->
      <div class="body-section body-section-organ">
        <div class="body-torso">
          <div class="organ-window">
            <svg class="organ-svg" viewBox="0 0 220 280">
              <defs>
                <linearGradient id="intestineGrad" x1="0.2" y1="0" x2="0.8" y2="1">
                  <stop offset="0%" stop-color="#c9506a"/>
                  <stop offset="100%" stop-color="#7a1e38"/>
                </linearGradient>
              </defs>
              <!-- Background cavity -->
              <rect x="10" y="10" width="200" height="260" rx="40" fill="#3d1020"/>
              <!-- Border -->
              <rect x="10" y="10" width="200" height="260" rx="40" fill="none" stroke="#9e3a52" stroke-width="6"/>
              <!-- Intestine — S-curves winding down -->
              <path d="M70 40 C70 40 160 40 160 70 C160 100 55 90 55 120 C55 150 160 140 160 170 C160 200 55 190 55 218 C55 245 110 250 140 250"
                    fill="none" stroke="#b55570" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
              <!-- Highlight on intestine -->
              <path d="M70 40 C70 40 160 40 160 70 C160 100 55 90 55 120 C55 150 160 140 160 170 C160 200 55 190 55 218 C55 245 110 250 140 250"
                    fill="none" stroke="#c87088" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
